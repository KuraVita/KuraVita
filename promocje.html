
<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuraVita - Sklep</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

/* HEADER */
header {
    background: white;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

header img {
    max-height: 200px;
}

.cart {
    font-size: 18px;
    font-weight: bold;
}

/* NAVBAR */
.navbar {
    background: #2e7d32;
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    color: #c8e6c9;
}


/* KOSZYK */
.cart-box {
    background: white;
    margin: 20px auto;
    padding: 20px;
    max-width: 500px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

/* VIDEO */
.video-section {
    text-align: center;
    padding: 40px;
}

video {
    max-width: 80%;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <img src="logo.jpg">
    <div class="cart">🛒 Koszyk: <span id="cart-count">0</span></div>
</header>

<!-- NOWY PASEK NAWIGACJI -->

<nav class="navbar">
<a href="promocje.html">Promocje</a>
    <a href="rebus.html">Rebus</a>
    <a href="blog.html">Blog</a>
    <a href="onas">O nas</a>
</nav>



<section class="video-section">
    <video controls>
        <source src="film1.mp4" type="video/mp4">
    </video>
</section>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("cart-count").innerText = cart.length;
    updateCart();
}

function updateCart() {
    const cartItems = document.getElementById("cart-items");
    cartItems.innerHTML = "";

    cart.forEach((item, index) => {
        const div = document.createElement("div");
        div.classList.add("cart-item");
        div.innerHTML = `
            <span>${item.name}</span>
            <span>${item.price} zł</span>
        `;
        cartItems.appendChild(div);
    });

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
