<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuraVita - Promocje</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

/* HEADER */
header {
    background: white;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

header img {
    max-height: 80px;
}

/* NAVBAR */
.navbar {
    background: #2e7d32;
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 40px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.navbar a:hover {
    color: #c8e6c9;
}

/* PRODUKTY */
.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
    flex-wrap: wrap;
}

.product {
    background: white;
    border-radius: 10px;
    padding: 20px;
    width: 28px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.price-old {
    text-decoration: line-through;
    color: gray;
}

.price-new {
    color: red;
    font-size: 22px;
    font-weight: bold;
}
</style>

</head>

<body>

<header>
    <img src="logo.jpg">
</header>

<nav class="navbar">
    <a href="index.html">Sklep</a>
    <a href="promocje.html">Promofffffffffffffffffffffffffffffffffcje</a>
    <a href="#">Rebfffffffffffffffffffus</a>
    <a href="#">Blog</a>
    <a href="#">O nas</a>
</nav>

<section class="products">

<div class="product">
    <img src="produkt1.jpg">
    <h3>Mieszanka paszowa</h3>
    <p>Wspiera odporność kur</p>
    <div class="price-old">50 333333333zł</div>
    <div class="price-new">3533333 zł 🔥</div>
</div>

<div class="product">
    <img src="produkt2.jpg">
    <h3>Z pokrzywą i jabłkiem</h3>
    <p>Naturalne wsparcie zdrowia</p>
    <div class="price-old">50 zł</div>
    <div class="price-new">39 zł 🔥</div>
</div>

</section>

</body>
</html>
